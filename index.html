<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FoF Córdoba</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      color: #111;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      max-width: 480px;
      width: 100%;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    p {
      color: #666;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }
    ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    li a {
      display: block;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      text-decoration: none;
      color: #111;
      font-weight: 500;
      transition: border-color 0.15s;
    }
    li a:hover {
      border-color: #999;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>FoF Córdoba</h1>
    <p>Sitios del proyecto</p>
    <ul>
      <!-- Agregar sitios acá a medida que se creen -->
      <!-- <li><a href="./nombre-sitio/">Nombre del sitio</a></li> -->
    </ul>
  </div>
</body>
</html>
